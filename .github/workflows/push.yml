name: Build and deploy

# Trigges av push til main gjort av et menneske/agent (GitHub-knappen eller gh CLI).
# Merger dependabot-auto-merge-workflowen en PR med GITHUB_TOKEN, trigges denne workflowen ikke
# (GitHub starter ikke workflows fra pushes gjort med GITHUB_TOKEN).
# Dependabot-merger publiseres og releases derfor først ved neste vanlige push til main.

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

# Raske påfølgende pushes ga overlappende kjøringer.
# Kjør publisering og release serielt; ved flere ventende kjøringer vinner den nyeste.
concurrency:
  group: build-and-deploy
  cancel-in-progress: false

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitHooks/**'
      - '.gitignore'
      - '.idea/**'
      - '.nais/alerts.yml'
      - 'clean_lint_and_build.sh'
      - 'CODEOWNERS'
      - 'doc/**'
      - 'docker-compose/**'
      - 'docs/**'
      - 'LICENSE'
      - 'lint_and_build.sh'

jobs:
  build:
    name: test, build and release
    runs-on: ubuntu-latest
    permissions:
      packages: write
      checks: write
      contents: write
      # Attestering av publiserte jar-er (actions/attest) krever OIDC-token og skrivetilgang til attestations-API-et.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Ikke la tokenet ligge igjen i .git/config - publish-steget kjører avhengigheters kode.
          persist-credentials: false
      # Versjonen er et rent UTC-tidsstempel og gjenbrukes aldri på tvers av kjøringer.
      # GitHub Packages er immutable (409 ved republisering), så gjenbruk av versjonsnummer
      # etter en delvis feilet publisering låste tidligere bygget permanent fast (0.0.849, juni 2026).
      # Feiler publiseringen delvis nå, lages ingen tag/release, og neste kjøring får en ny versjon.
      # Foreldreløse modulversjoner fra en feilet kjøring er harmløse - ingen tag/release peker på dem.
      # Tag/release lages til slutt og peker på commiten, så komplett versjon <-> commit er alltid entydig.
      # Monotont økende (og dermed Dependabot-vennlig) fordi concurrency-gruppa over kjører serielt.
      - name: Sett versjon fra UTC-tidsstempel
        id: tag
        run: echo "version=0.0.$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: 25
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          gradle-version: wrapper
          # Ingen gradle-cache i publiserings-workflowen: artefaktene vi attesterer skal bygges fra friske avhengigheter, ikke fra en cache som kan forgiftes (zizmor: cache-poisoning).
          # Publiseringene er serialiserte og relativt sjeldne, så tregere bygg er akseptabelt.
          cache-disabled: true
          # Send den resolvede avhengighetsgrafen til GitHubs dependency submission-API (krever contents: write).
          # Gir Dependabot-alerts også for transitive avhengigheter, ikke bare de deklarerte.
          dependency-graph: generate-and-submit
      - name: Build, test, and publish
        run: ./gradlew --console=plain -Pversion=${{ steps.tag.outputs.version }} build publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # SLSA-provenance for de publiserte jar-ene, se navikt/tiltakspenger-libs#528.
      # Attestasjonen binder hver jar (inkl. sources- og testFixtures-jar-er) kryptografisk til commit og workflow-kjøring via GitHubs artifact attestations.
      # Konsumenter verifiserer med `gh attestation verify <jar> --repo navikt/tiltakspenger-libs` - se README.
      # buildSrc-jaren er et internt byggeprodukt som aldri publiseres, så den ekskluderes.
      # Feiler attesteringen, lages ingen tag/release - samme delvis-feilet-historie som ved feilet publisering over, og neste kjøring får ny versjon.
      - name: Attester publiserte jar-er (SLSA-provenance)
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            **/build/libs/*.jar
            !buildSrc/**
      - name: Create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.tag.outputs.version }}
          tag_name: ${{ steps.tag.outputs.version }}
          prerelease: false
