name: Build and deploy

# Trigges av push til main gjort av et menneske/agent (GitHub-knappen eller gh CLI).
# Merger dependabot-auto-merge-workflowen en PR med GITHUB_TOKEN, trigges denne workflowen ikke
# (GitHub starter ikke workflows fra pushes gjort med GITHUB_TOKEN).
# Dependabot-merger publiseres og releases derfor først ved neste vanlige push til main.
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.gitHooks/**'
      - '.gitignore'
      - '.idea/**'
      - '.nais/alerts.yml'
      - 'clean_lint_and_build.sh'
      - 'CODEOWNERS'
      - 'doc/**'
      - 'docker-compose/**'
      - 'docs/**'
      - 'LICENSE'
      - 'lint_and_build.sh'

jobs:
  build:
    name: test, build and release
    runs-on: ubuntu-latest
    permissions:
      packages: write
      checks: write
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # include git tags
      - uses: paulhatch/semantic-version@v6.0.2
        id: tag
        with:
          bump_each_commit: true
          tag_prefix: ""
      - uses: actions/setup-java@v5.5.0
        with:
          java-version: 25
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: wrapper
      - name: Build, test, and publish
        run: ./gradlew --console=plain -Pversion=${{ steps.tag.outputs.version }} build publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.tag.outputs.version }}
          tag_name: ${{ steps.tag.outputs.version }}
          prerelease: false
