on: [ pull_request ]
name: Pull Request

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
   test:
    runs-on: ubuntu-latest
    name: Run Test
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5.3.0
        with:
          java-version: 21
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: wrapper
      - shell: bash
        run: ./gradlew spotlessCheck build
